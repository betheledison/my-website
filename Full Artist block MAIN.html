        .be-artist-name {

            text-align: center; 
            font-size: clamp(2rem, 8vw, 4rem); 
            font-weight: 900; 
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .name-blue { color: var(--text-blue); }
        .name-white { color: var(--text-white); }

        .be-content { 
            padding: 40px; 
            max-width: 1200px; 
            margin: 0 auto;

        .be-spotify-top { margin-bottom: 40px; }

        .be-links {
            display: grid;
            /* UPDATED: Default grid to 4 columns, auto-expanding on larger screens */
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .be-link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg);
            color: var(--text-white);
            text-decoration: none;
            padding: 25px 10px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            text-align: center;
        }

        .be-link-item:hover { 
            border-color: var(--text-blue); 
            background-color: var(--hover-accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(55, 188, 249, 0.2);
        }

        .be-link-item i { font-size: 2rem; margin-bottom: 12px; color: var(--text-blue); }
        .be-link-item span { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .embed-label { 
            font-size: 1rem; 
            color: var(--text-blue); 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            font-weight: 900; 
            text-align: center; 
            display: block; 
            letter-spacing: 2px;
        }

        @media (max-width: 1024px) {
            .be-links { 
                grid-template-columns: repeat(4, 1fr); 
                gap: 15px; 
            }
        }

        @media (max-width: 768px) {
            .be-content { padding: 20px; }
            .be-links { 
                /* FORCE 4 IN A ROW ON MOBILE */
                grid-template-columns: repeat(4, 1fr); 
                gap: 8px; 
            }
            .be-link-item { padding: 15px 5px; }
            .be-link-item i { font-size: 1.5rem; } /* Slightly smaller icons for 4-column mobile fit */
            .be-link-item span { font-size: 0.6rem; }
            .be-header { padding-top: 60%; }
        }
